<style>
:root {
  /* Palette dérivée de #017444 */
  --brand:       #017444;
  --brand-dark:  #014d2d;
  --brand-deep:  #012e1b;
  --brand-mid:   #025c36;
  --brand-light: #02a35f;
  --brand-pale:  #04c874;
  --brand-ghost: rgba(1,116,68,.18);
  --brand-border:rgba(1,116,68,.35);

  --cream:       #e8f5ee;
  --cream-dim:   rgba(232,245,238,.55);
  --cream-mute:  rgba(232,245,238,.35);
  --cream-faint: rgba(232,245,238,.15);

  --gold:        #d4a72c;
  --gold-l:      #f0c84a;

  --water:       #69cfff;
  --water-l:     #4dbde8;
  --water-ghost: rgba(26,143,196,.2);
  --water-border:rgba(77,189,232,.4);

  --danger:      #c0392b;
  --danger-ghost:rgba(192,57,43,.2);
  --danger-bord: rgba(192,57,43,.4);
  --danger-text: #e87c6c;

  --ready-glow:  rgba(240,200,74,.7);
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--brand-deep);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* ── HEADER ── */
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem; color: var(--brand-pale); font-weight: 700;
  letter-spacing: .01em;
}
#status-dot {
  display: flex; align-items: center; gap: 6px;
  font-size: .72rem; color: var(--cream-mute);
}
#status-dot::before {
  content: ''; width: 7px; height: 7px; border-radius: 50%;
  background: rgba(232,245,238,.2); transition: background .3s;
}
#status-dot.ok::before  { background: var(--brand-pale); box-shadow: 0 0 6px var(--brand-pale); }
#status-dot.err::before { background: var(--danger); }

/* ── LÉGENDE ── */
.legend-bar {
  display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
  padding: .4rem 1.5rem;
  background: rgba(1,77,45,.5);
  font-size: .7rem; color: var(--cream-mute);
  border-bottom: 1px solid rgba(1,116,68,.2);
  position: sticky; top: 0; z-index: 50;
}
.leg { display: flex; align-items: center; gap: 4px; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid; flex-shrink: 0; }

/* ── MAP ── */
#map-wrap {
  position: relative; width: 100%; max-width: 1200px;
  margin: 0 auto; user-select: none;
}
#bg-map { width: 100%; display: block; }

/* ── MARQUEUR ── */
.marker {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: transform .15s;
  z-index: 10;
}
.marker:hover  { transform: translate(-50%,-50%) scale(1.22); z-index: 20; }
.marker:active { transform: translate(-50%,-50%) scale(.93); }

.mk {
  border-radius: 50%;
  border: 2px solid rgba(232,245,238,.25);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 9px; font-weight: 500; color: var(--cream);
  transition: border-color .2s, box-shadow .2s, background .2s;
  position: relative;
}

/* Tailles par zone */
.marker.champ  .mk { width: 55px; height: 55px; background: var(--brand-mid); }
.marker.serre  .mk { width: 55px; height: 55px; background: #737373; }
.marker.verger .mk { width: 55px; height: 55px; background: #636363; font-size: 11px; }

/* États */
.marker.planted .mk {
  border-color: rgba(0, 182, 106, 0.8);
  box-shadow: 0 0 8px rgba(2,163,95,.35);
  background: #014d2d;
}
.marker.watered .mk {
  border-color: var(--water-l);
  box-shadow: 0 0 8px rgba(77,189,232,.35);
  background: #0a3d55;
}
.marker.ready .mk {
  border-color: var(--gold-l);
  background: #2a3a10;
  animation: pg 2s ease-in-out infinite;
}
@keyframes pg {
  0%,100% { box-shadow: 0 0 5px rgba(240,200,74,.3); }
  50%      { box-shadow: 0 0 18px rgba(240,200,74,.75); }
}

.mk-emoji { font-size: 15px; line-height: 1; }
.mk-label { font-size: 8px; opacity: .8; line-height: 1; margin-top: 1px; }

.mk-timer {
  position: absolute; bottom: -18px; left: 50%;
  transform: translateX(-50%);
  background: rgba(1,20,10,.9);
  border: 1px solid var(--brand-border);
  border-radius: 9px; padding: 1px 6px;
  font-size: 8px; white-space: nowrap; color: var(--cream-dim);
  font-variant-numeric: tabular-nums; pointer-events: none;
}
.mk-timer.rt { color: var(--gold-l); border-color: rgba(240,200,74,.4); }

/* ── MODAL ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(1,20,10,.82); backdrop-filter: blur(6px);
  z-index: 100; align-items: center; justify-content: center; padding: 1rem;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--brand-dark);
  border: 1px solid var(--brand-border);
  border-radius: 16px; padding: 1.75rem;
  width: 100%; max-width: 460px; position: relative;
  animation: mi .2s ease;
  box-shadow: 0 24px 60px rgba(1,10,5,.6);
}
@keyframes mi { from { opacity:0; transform:translateY(12px) scale(.97); } to { opacity:1; transform:none; } }

.modal h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; color: var(--brand-pale);
  margin-bottom: 1.25rem; display: flex; align-items: center; gap: .5rem;
}
.modal-zone-badge {
  font-size: .65rem; font-family: 'DM Sans', sans-serif; font-weight: 500;
  background: var(--brand-ghost); border: 1px solid var(--brand-border);
  color: var(--brand-pale); padding: 2px 8px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: .06em;
}
.modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none; color: var(--cream-mute);
  font-size: 1.1rem; cursor: pointer; padding: 4px 8px; border-radius: 6px;
  transition: color .2s;
}
.modal-close:hover { color: var(--cream); }

/* Champs form */
.fld { margin-bottom: 1rem; }
.fld label {
  display: block; font-size: .7rem; text-transform: uppercase;
  letter-spacing: .07em; color: var(--cream-mute); margin-bottom: .3rem;
}
.fld input {
  width: 100%; background: rgba(232,245,238,.05);
  border: 1px solid var(--brand-border); border-radius: 8px;
  color: var(--cream); font-family: 'DM Sans', sans-serif;
  font-size: .9rem; padding: .55rem .85rem; outline: none;
  transition: border-color .2s;
}
.fld input:focus { border-color: var(--brand-light); }

/* Grille cultures */
.crop-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-top: .3rem; }
.crop-btn {
  background: var(--brand-ghost);
  border: 1px solid var(--brand-border);
  border-radius: 9px; padding: 8px 4px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  transition: border-color .15s, background .15s; color: var(--cream);
}
.crop-btn:hover   { border-color: var(--brand-light); background: rgba(1,116,68,.3); }
.crop-btn.selected { border-color: var(--brand-pale); background: rgba(1,116,68,.45); box-shadow: 0 0 8px rgba(4,200,116,.25); }
.crop-btn .ce { font-size: 22px; }
.crop-btn .cn { font-size: 9px; color: var(--cream-dim); font-weight: 400; }
.crop-btn .ct { font-size: 8px; color: var(--cream-mute); }

/* Info parcelle plantée */
.planted-box {
  background: rgba(1,77,45,.35);
  border: 1px solid var(--brand-border);
  border-radius: 12px; padding: .9rem 1.1rem;
  display: flex; align-items: center; gap: .9rem; margin-bottom: 1rem;
}
.planted-box .pe { font-size: 2.4rem; }
.planted-box .pt p { font-size: .92rem; font-weight: 500; color: var(--cream); }
.planted-box .pt span { font-size: .78rem; color: var(--cream-mute); line-height: 1.6; }
.planted-box .pt .highlight { color: var(--brand-pale); font-weight: 400; }

/* Boutons */
.actions { display: flex; gap: 6px; margin-top: 1.2rem; flex-wrap: wrap; }
.btn {
  flex: 1; min-width: 80px;
  padding: .58rem .8rem; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: .83rem;
  cursor: pointer; font-weight: 500;
  transition: all .15s; white-space: nowrap;
  border: 1px solid transparent;
}
.btn-primary {
  background: var(--brand); border-color: var(--brand-light);
  color: var(--cream);
}
.btn-primary:hover { background: var(--brand-light); }
.btn-ghost {
  background: transparent; border-color: var(--brand-border); color: var(--cream-dim);
}
.btn-ghost:hover { background: var(--brand-ghost); color: var(--cream); }
.btn-harvest {
  background: rgba(212,167,44,.2); border-color: rgba(240,200,74,.5); color: var(--gold-l);
}
.btn-harvest:hover { background: rgba(212,167,44,.35); }
.btn-water {
  background: var(--water-ghost); border-color: var(--water-border); color: var(--water-l);
}
.btn-water:hover { background: rgba(26,143,196,.35); }
.btn-danger {
  background: var(--danger-ghost); border-color: var(--danger-bord); color: var(--danger-text);
}
.btn-danger:hover { background: rgba(192,57,43,.35); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--brand-dark); border: 1px solid var(--brand-border);
  color: var(--cream); padding: .65rem 1.4rem;
  border-radius: 30px; font-size: .83rem;
  z-index: 200; transition: transform .3s ease; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(1,10,5,.5);
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── SETUP ── */
#setup-banner {
  background: var(--danger-ghost); border: 1px solid var(--danger-bord);
  border-radius: 10px; padding: 1rem 1.5rem; margin: 1rem;
  font-size: .82rem; line-height: 1.7;
}
#setup-banner strong { color: var(--gold-l); }
#setup-banner code { background: rgba(255,255,255,.08); padding: 1px 6px; border-radius: 4px; font-size: .78rem; font-family: monospace; }
#setup-banner pre { background: rgba(0,0,0,.4); padding: 8px 10px; border-radius: 6px; overflow-x: auto; font-size: .75rem; font-family: monospace; margin-top: 6px; color: var(--cream-dim); }
#setup-banner.hidden { display: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--brand-deep); }
::-webkit-scrollbar-thumb { background: var(--brand-mid); border-radius: 3px; }

.marker.repos .mk {
  border-color: rgba(192,57,43,.5);
  background: #2a1510;
  opacity: .75;
}

</style>
</head>

}

async function loadHistorique() {
  const content = document.getElementById('histo-content');
  if (!sb) { content.textContent = 'Non connecté.'; return; }
  const { data, error } = await sb.from('historique').select('*').order('created_at', { ascending: false }).limit(50);
  if (error || !data?.length) { content.textContent = 'Aucun historique.'; return; }
  const cult = id => CULTURES.find(c => c.id === id);
  content.innerHTML = data.map(r => {
    const c = cult(r.culture_id);
    const date = new Date(r.created_at).toLocaleString('fr-FR');
    const par = r.plante_par ? ` par <strong>${r.plante_par}</strong>` : '';
    return `<div style="padding:5px 0;border-bottom:1px solid rgba(1,116,68,.15);">
      ${c?.emoji||'?'} <strong>${c?.nom||r.culture_id}</strong> — ${r.action}${par} — Parcelle <strong>${r.parcelle_id}</strong> — ${date}
    </div>`;
  }).join('');
}
async function loadAll() {
  if (!sb) { setStatus('Mode démo (Supabase non configuré)', false); renderAll(); return; }
  const { data, error } = await sb.from('parcelles').select('*');
  if (error) { setStatus('Erreur lecture base', false); renderAll(); return; }
  PARCELLES.forEach(p => state[p.id] = null);
  (data||[]).forEach(r => state[r.id] = r);
  setStatus('Connecté ✓', true);
  renderAll();
}

function subscribeRT() {
  if (!sb) return;
  sb.channel('rt').on('postgres_changes',
    { event:'*', schema:'public', table:'parcelles' },
    payload => {
      if (payload.eventType === 'DELETE') state[payload.old.id] = null;
      else state[payload.new.id] = payload.new;
      renderAll();
    }
  ).subscribe();
}

async function refreshMap() {
  const btn = document.getElementById('btn-refresh');
  btn.textContent = '⏳ Actualisation…';
  btn.style.opacity = '.5';
  btn.style.pointerEvents = 'none';
  await loadAll();
  btn.textContent = '✅ Actualisé !';
  setTimeout(() => {
    btn.textContent = '🔄 Actualiser';
    btn.style.opacity = '';
    btn.style.pointerEvents = '';
  }, 5000);
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function renderAll() {
  const wrap = document.getElementById('map-wrap');
  wrap.querySelectorAll('.marker').forEach(m => m.remove());
  PARCELLES.forEach(p => wrap.appendChild(buildMarker(p)));
}
function buildMarker(p) {
  const el = document.createElement('div');
  el.className = `marker ${p.zone}`;
  el.style.left = p.left + '%';
  el.style.top  = p.top  + '%';
  el.dataset.id = p.id;
  el.onclick = () => openModal(p.id);

  const mk = document.createElement('div');
  mk.className = 'mk';

  const timer = document.createElement('div');
  timer.className = 'mk-timer';

  const data = state[p.id];

  if (!data?.culture_id) {
    const enRepos = data?.repos_jusqua && new Date(data.repos_jusqua).getTime() > Date.now();
    if (enRepos) {
      el.classList.add('repos');
      const diff = new Date(data.repos_jusqua).getTime() - Date.now();
      const m = Math.floor(diff / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      const label = m > 0 ? `${m}m${String(s).padStart(2,'0')}s` : `${s}s`;
      if (p.zone === 'verger') {
        mk.innerHTML = `<span style="font-size:16px;line-height:1">😴</span><span style="font-size:8px;opacity:.65;margin-top:1px">${p.id}</span>`;
      } else {
        mk.innerHTML = `<span style="font-size:9px;opacity:.8">😴 ${p.id}</span>`;
      }
      timer.className = 'mk-timer';
      timer.textContent = `Repos ${label}`;
    } else {
      if (p.zone === 'verger') {
        mk.innerHTML = `<span style="font-size:18px;line-height:1">${p.emoji}</span><span style="font-size:8px;opacity:.65;margin-top:1px">${p.id}</span>`;
      } else {
        mk.innerHTML = `<span style="font-size:11px;font-weight:500;opacity:.8">${p.id}</span>`;
      }
      timer.style.display = 'none';
    }

  } else {
    // Parcelle plantée
    const cult = CULTURES.find(c => c.id === data.culture_id);
    const { ready, label } = timerInfo(data);
    const watered = !!data.arrose_le;

    if (ready) {
      el.classList.add('ready');
      timer.className = 'mk-timer rt';
      timer.textContent = '✨ Prêt';
    } else {
      el.classList.add(watered ? 'watered' : 'planted');
      timer.textContent = label;
    }

    if (p.zone === 'verger') {
      mk.innerHTML = `<span style="font-size:18px;line-height:1">${cult?.emoji||'?'}</span><span style="font-size:8px;opacity:.65;margin-top:1px">${p.id}</span>`;
    } else {
      mk.innerHTML = `<span class="mk-emoji">${cult?.emoji||'?'}</span>`;
    }
  }

  el.appendChild(mk);
  el.appendChild(timer);
  return el;
}

function timerInfo(data) {
  if (!data?.recolte_le) return { ready:false, label:'' };
  const diff = new Date(data.recolte_le).getTime() - Date.now();
  if (diff <= 0) return { ready:true, label:'Prêt' };
  const m = Math.floor(diff/60000), s = Math.floor((diff%60000)/1000);
  return { ready:false, label: m > 0 ? `${m}m${String(s).padStart(2,'0')}s` : `${s}s` };
}

// Tick toutes les secondes
setInterval(() => {
  document.querySelectorAll('.marker').forEach(el => {
    const data = state[el.dataset.id];
    const t = el.querySelector('.mk-timer');
    if (!t) return;

    if (data?.culture_id && data?.recolte_le) {
      // timer récolte existant
      const { ready, label } = timerInfo(data);
      if (ready && !el.classList.contains('ready')) {
        el.classList.remove('planted','watered'); el.classList.add('ready');
        t.className = 'mk-timer rt'; t.textContent = '✨ Prêt';
      } else if (!ready) { t.textContent = label; }

    } else if (data?.repos_jusqua) {
      // timer repos
      const diff = new Date(data.repos_jusqua).getTime() - Date.now();
      if (diff <= 0) {
        el.classList.remove('repos');
        t.style.display = 'none';
        state[el.dataset.id] = null;
      } else {
        const m = Math.floor(diff / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        t.textContent = `Repos ${m}m${String(s).padStart(2,'0')}s`;
      }
    }
  });
}, 1000);

// ══════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════
let currentId = null, selectedCrop = null;

async function openModal(id) {
  currentId = id; selectedCrop = null;
  const p = PARCELLES.find(x => x.id === id);
  const data = state[id];
  const enRepos = data?.repos_jusqua && new Date(data.repos_jusqua).getTime() > Date.now();
  const zoneLabels = { champ:'Champ', serre:'Serre', verger:'Verger' };
  const zl = zoneLabels[p.zone];

  document.getElementById('modal-title').innerHTML =
    `${zl} ${p.id} <span class="modal-zone-badge">${zl}</span>`;

  const body = document.getElementById('modal-body');

  if (data?.culture_id) {
    const cult = CULTURES.find(c => c.id === data.culture_id);
    const { ready, label } = timerInfo(data);
    const dateStr = new Date(data.plante_le).toLocaleString('fr-FR');
    const watered = !!data.arrose_le;

    body.innerHTML = `
      <div class="planted-box">
        <div class="pe">${cult?.emoji||'?'}</div>
        <div class="pt">
          <p>${cult?.nom || data.culture_id}</p>
          <span>Planté${data.plante_par ? ' par <strong>'+data.plante_par+'</strong>' : ''} — ${dateStr}</span><br>
          <span class="${ready?'highlight':''}">${ready ? '✨ Prêt à récolter !' : '⏱ Récolte dans : '+label}</span>
          ${watered ? '<br><span>💧 Arrosé — temps réduit de 10 minutes !</span>' : ''}
        </div>
      </div>
      <div class="fld">
        <label>Ton prénom</label>
        <input type="text" id="modal-who" placeholder="ex: Jean" maxlength="50">
      </div>
      <div class="actions">
        ${!ready ? `<button class="btn btn-water" onclick="waterParcel()">💧 Arroser</button>` : ''}
        ${ready ? `<button class="btn btn-harvest" onclick="harvestParcel()">✂️ Récolter</button>` : ''}
        <button class="btn btn-danger" onclick="clearParcel()">🗑 Effacer</button>
        <button class="btn btn-ghost" onclick="closeModal()">Fermer</button>
      </div>`;

  } else {
    // Vérification repos
    if (enRepos) {
      const diff = new Date(data.repos_jusqua).getTime() - Date.now();
      const m = Math.floor(diff / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      body.innerHTML = `
        <div style="text-align:center;padding:1.5rem 0;color:var(--cream-mute);">
          <div style="font-size:2.5rem;margin-bottom:.5rem">😴</div>
          <div style="font-size:1rem;color:var(--cream-dim);margin-bottom:.25rem">Parcelle en repos</div>
          <div style="font-size:.85rem">Disponible dans <strong style="color:var(--gold-l)">${m}m ${s}s</strong></div>
        </div>
        <div class="actions">
          <button class="btn btn-ghost" onclick="closeModal()">Fermer</button>
        </div>`;
      document.getElementById('modal-bg').classList.add('open');
      return;
    }
    // Parcelle vide
    let derniereInfo = null;
    if (sb) {
      const { data: row } = await sb.from('parcelles').select('derniere_culture').eq('id', p.id).maybeSingle();
      if (row?.derniere_culture) {
        derniereInfo = CULTURES.find(c => c.id === row.derniere_culture);
      }
    }
    const derniereHtml = derniereInfo ? `
      <div style="background:rgba(1,116,68,.1);border:1px solid var(--brand-border);border-radius:10px;padding:.6rem 1rem;margin-bottom:1rem;font-size:.8rem;color:var(--cream-mute);">
        🔄 Dernière culture : ${derniereInfo.emoji} <strong style="color:var(--cream-dim)">${derniereInfo.nom}</strong>
      </div>` : '';

    if (p.zone === 'verger') {
      const forcedId = VERGER_CULTURE[p.id];
      const cult = CULTURES.find(c => c.id === forcedId);
      body.innerHTML = `
        ${derniereHtml}
        <div class="fld">
          <label>Ton prénom</label>
          <input type="text" id="modal-who" placeholder="ex: Jean" maxlength="20">
        </div>
        <div style="background:rgba(1,116,68,.15);border:1px solid var(--brand-border);border-radius:10px;padding:.8rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;">
          <span style="font-size:2rem">${cult?.emoji}</span>
          <div>
            <div style="font-weight:500;color:var(--cream)">${cult?.nom}</div>
            <div style="font-size:.78rem;color:var(--cream-mute)">Culture fixe — ${cult?.duree} min</div>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="plantVerger('${forcedId}')">🌱 Planter</button>
          <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        </div>`;

    } else {
      // Champ ou serre
      const culturesZone = CULTURES.filter(c => c.zones.includes(p.zone));
      body.innerHTML = `
        ${derniereHtml}
        <div class="fld">
          <label>Ton prénom</label>
          <input type="text" id="modal-who" placeholder="ex: Jean" maxlength="20">
        </div>
        <div class="fld">
          <label>Culture à planter</label>
          <div class="crop-grid">
            ${culturesZone.map(c => `
              <button class="crop-btn" data-crop="${c.id}" onclick="selectCrop('${c.id}')">
                <span class="ce">${c.emoji}</span>
                <span class="cn">${c.nom}</span>
                <span class="ct">${c.duree} min</span>
              </button>`).join('')}
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="plantParcel()">🌱 Planter</button>
          <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        </div>`;
    }
  }

  document.getElementById('modal-bg').classList.add('open');
}

function selectCrop(id) {
  selectedCrop = id;
  document.querySelectorAll('.crop-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`.crop-btn[data-crop="${id}"]`)?.classList.add('selected');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  currentId = null; selectedCrop = null;
}

async function plantParcel() {
  if (!selectedCrop) return toast('Choisis une culture d\'abord !');
  await doPlant(currentId, selectedCrop);
}
async function plantVerger(cultureId) {
  await doPlant(currentId, cultureId);
}

async function doPlant(id, cultureId) {
  const who  = document.getElementById('modal-who')?.value.trim() || '';
  const cult = CULTURES.find(c => c.id === cultureId);
  const now  = new Date();
  const row  = {
    id, culture_id: cultureId,
    plante_par: who || null,
    plante_le: now.toISOString(),
    arrose_le: null,
    recolte_le: new Date(now.getTime() + cult.duree * 60000).toISOString(),
  };
  state[id] = row;
  await dbUpsert(row);
  await dbLog(id, cultureId, 'planté', who || null);
  closeModal(); renderAll();
  toast(`${cult.emoji} ${cult.nom} planté(e) !`);
}

async function waterParcel() {
  const data = state[currentId]; if (!data) return;
  const now = Date.now();
  const rem = new Date(data.recolte_le).getTime() - now;
  if (rem <= 0) return toast('Déjà prêt !');
  const WATER_COOLDOWN = 20 * 60000; // 20 minutes
  if (data.arrose_le && (now - new Date(data.arrose_le).getTime()) < WATER_COOLDOWN) {
    const attente = Math.ceil((WATER_COOLDOWN - (now - new Date(data.arrose_le).getTime())) / 60000);
    return toast(`💧 Arrosage disponible dans ${attente} min`);
  }
  const WATER_MINUTES = 10; // ← minutes retirées, change cette valeur
  const updated = {
  ...data,
  arrose_le: new Date().toISOString(),
  recolte_le: new Date(now + rem - WATER_MINUTES * 60000).toISOString(),
  };
  state[currentId] = updated;
  await dbUpsert(updated);
  closeModal(); renderAll();
  toast('💧 Arrosé ! Récolte dans moins de temps (-30%)');
}

async function harvestParcel() {
  const data = state[currentId];
  const cult = CULTURES.find(c => c.id === data?.culture_id);
  const who = document.getElementById('modal-who')?.value.trim() || data?.plante_par || null;
  const repos_jusqua = new Date(Date.now() + 60 * 60000).toISOString();
  const row = { id: currentId, culture_id: null, derniere_culture: cult?.id || null, repos_jusqua };
  state[currentId] = row;
  await sb?.from('parcelles').upsert(row);
  await dbLog(currentId, cult?.id, 'récolté', who);
  closeModal(); renderAll();
  toast(`✂️ ${cult?.emoji} ${cult?.nom} récolté(e) ! Repos 1h.`);
}

async function clearParcel() {
  if (!confirm('Effacer cette parcelle ?')) return;
  const data = state[currentId];
  const cult = CULTURES.find(c => c.id === data?.culture_id);
  const repos_jusqua = new Date(Date.now() + 60 * 60000).toISOString();
  const row = { id: currentId, culture_id: null, derniere_culture: cult?.id || null, repos_jusqua };
  state[currentId] = row;
  await sb?.from('parcelles').upsert(row);
  await dbLog(currentId, cult?.id, 'effacé', null);
  closeModal(); renderAll();
  toast('Parcelle libérée. Repos 1h.');
}

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target.id === 'modal-bg') closeModal();
});

// ══════════════════════════════════════════════
// UTILITAIRES
// ══════════════════════════════════════════════
function setStatus(msg, ok) {
  const el = document.getElementById('status-dot');
  el.textContent = msg; el.className = ok ? 'ok' : 'err';
}
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

loadAll();
subscribeRT();
</script>
